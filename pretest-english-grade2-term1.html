<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>中2前期中間 英語プレテスト｜進学塾クロフネ</title>
<style>
:root {
  --navy: #1a3a5c;
  --navy-mid: #2d4e6e;
  --navy-pale: #e8f0f9;
  --navy-ultra: #f0f5fb;
  --green: #16a34a;
  --border: #d6e0ed;
  --surface: #f4f7fb;
  --text: #1a2535;
  --text-muted: #5a6a7e;
  --radius: 10px;
  --shadow: 0 4px 16px rgba(26,58,92,0.10);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Hiragino Sans','Noto Sans JP',-apple-system,sans-serif;
  background: var(--surface);
  color: var(--text);
  min-height: 100vh;
  font-size: 14px;
  -webkit-font-smoothing: antialiased;
}

/* ヘッダー */
.site-header {
  background: linear-gradient(90deg, var(--navy) 0%, var(--navy-mid) 100%);
  color: white;
  padding: 12px 16px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.18);
}
.header-inner {
  max-width: 560px;
  margin: 0 auto;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.header-title { font-size: 14px; font-weight: bold; }
.header-sub { font-size: 11px; opacity: 0.65; margin-top: 2px; }
.back-btn {
  font-size: 12px;
  color: rgba(255,255,255,0.85);
  background: rgba(255,255,255,0.12);
  border: 1px solid rgba(255,255,255,0.3);
  border-radius: 7px;
  padding: 7px 12px;
  cursor: pointer;
  font-family: inherit;
  text-decoration: none;
  display: inline-flex;
  align-items: center;
  gap: 4px;
}

/* メイン */
.wrap {
  max-width: 560px;
  margin: 0 auto;
  padding: 20px 14px 48px;
}

.page-title {
  font-size: 18px;
  font-weight: bold;
  color: var(--navy);
  margin-bottom: 4px;
}
.page-sub {
  font-size: 12px;
  color: var(--text-muted);
  margin-bottom: 20px;
}

/* 音声プレーヤーカード */
.audio-card {
  background: white;
  border-radius: var(--radius);
  border: 1.5px solid var(--navy);
  box-shadow: var(--shadow);
  overflow: hidden;
  margin-bottom: 16px;
}
.audio-header {
  background: var(--navy);
  color: white;
  padding: 12px 16px;
  font-size: 14px;
  font-weight: bold;
  display: flex;
  align-items: center;
  gap: 8px;
}
.audio-body { padding: 16px; }
.audio-note {
  font-size: 12px;
  color: var(--text-muted);
  background: var(--navy-ultra);
  border-left: 3px solid var(--navy);
  padding: 8px 12px;
  border-radius: 6px;
  margin-bottom: 14px;
  line-height: 1.6;
}

/* カスタム音声プレーヤー */
.player-wrap {
  background: var(--navy-ultra);
  border-radius: var(--radius);
  padding: 16px;
  border: 1px solid var(--border);
}
.player-time {
  display: flex;
  justify-content: space-between;
  font-size: 12px;
  color: var(--text-muted);
  margin-bottom: 6px;
  font-variant-numeric: tabular-nums;
}
.player-bar-wrap {
  position: relative;
  height: 6px;
  background: var(--border);
  border-radius: 3px;
  margin-bottom: 16px;
  cursor: pointer;
}
.player-bar-fill {
  height: 100%;
  background: var(--navy);
  border-radius: 3px;
  width: 0%;
  transition: width 0.1s linear;
  pointer-events: none;
}
.player-controls {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 12px;
}
.btn-play {
  width: 56px; height: 56px;
  border-radius: 50%;
  background: var(--navy);
  color: white;
  border: none;
  cursor: pointer;
  font-size: 22px;
  display: flex; align-items: center; justify-content: center;
  transition: background 0.15s, transform 0.1s;
  flex-shrink: 0;
}
.btn-play:hover { background: var(--navy-mid); }
.btn-play:active { transform: scale(0.95); }
.btn-skip {
  background: none;
  border: 1.5px solid var(--border);
  border-radius: 8px;
  padding: 8px 14px;
  font-size: 12px;
  font-weight: bold;
  color: var(--text-muted);
  cursor: pointer;
  font-family: inherit;
  transition: background 0.15s;
}
.btn-skip:hover { background: white; }

/* PDFセクション */
.pdf-card {
  background: white;
  border-radius: var(--radius);
  border: 1px solid var(--border);
  box-shadow: 0 1px 4px rgba(26,58,92,0.08);
  overflow: hidden;
  margin-bottom: 10px;
}
.pdf-card-header {
  background: var(--navy-ultra);
  border-bottom: 1px solid var(--border);
  padding: 10px 14px;
  font-size: 12px;
  font-weight: bold;
  color: var(--text-muted);
  letter-spacing: 0.03em;
}
.pdf-row {
  display: flex;
  align-items: center;
  padding: 12px 14px;
  gap: 12px;
  border-bottom: 1px solid var(--surface);
}
.pdf-row:last-child { border-bottom: none; }
.pdf-icon {
  width: 32px; height: 32px;
  background: var(--navy-pale);
  border-radius: 7px;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  font-size: 14px;
}
.pdf-label { flex: 1; font-size: 13px; font-weight: bold; color: var(--text); }
.btn-pdf {
  padding: 9px 16px;
  background: var(--navy);
  color: white;
  border: none;
  border-radius: 8px;
  font-size: 12px;
  font-weight: bold;
  cursor: pointer;
  font-family: inherit;
  transition: background 0.15s;
  white-space: nowrap;
}
.btn-pdf:hover { background: var(--navy-mid); }
.btn-pdf.answer {
  background: var(--navy-ultra);
  color: var(--navy);
  border: 1.5px solid var(--border);
}
.btn-pdf.answer:hover { background: var(--navy-pale); }

.volume-row { display: flex; align-items: center; gap: 10px; margin-top: 14px; }
.volume-icon { font-size: 16px; flex-shrink: 0; }
.volume-slider { flex: 1; -webkit-appearance: none; appearance: none; height: 4px; border-radius: 2px; background: var(--border); outline: none; cursor: pointer; }
.volume-slider::-webkit-slider-thumb { -webkit-appearance: none; width: 18px; height: 18px; border-radius: 50%; background: var(--navy); cursor: pointer; }
.volume-slider::-moz-range-thumb { width: 18px; height: 18px; border-radius: 50%; background: var(--navy); cursor: pointer; border: none; }
.volume-val { font-size: 12px; color: var(--text-muted); min-width: 36px; text-align: right; font-variant-numeric: tabular-nums; }
audio { display: none; }
</style>
</head>
<body>

<header class="site-header">
  <div class="header-inner">
    <div>
      <div class="header-title">進学塾クロフネ</div>
      <div class="header-sub">塾生専用ページ</div>
    </div>
    <a class="back-btn" href="javascript:history.back()">← 戻る</a>
  </div>
</header>

<div class="wrap">
  <div class="page-title">中2　前期中間　英語プレテスト</div>
  <div class="page-sub">リスニング音声を聞きながら問題に取り組んでください。</div>

  <!-- 音声プレーヤー -->
  <div class="audio-card">
    <div class="audio-header">🔊 リスニング音声</div>
    <div class="audio-body">
      <div class="audio-note">⚠️ 音量を上げてからスタートしてください。<br>問題PDFを開いてから再生するとスムーズです。</div>
      <div class="player-wrap">
        <div class="player-time">
          <span id="timeCurrent">0:00</span>
          <span id="timeDuration">--:--</span>
        </div>
        <div class="player-bar-wrap" id="barWrap">
          <div class="player-bar-fill" id="barFill"></div>
        </div>
        <div class="player-controls">
          <button class="btn-skip" onclick="skip(-10)">⏪ 10秒</button>
          <button class="btn-play" id="btnPlay" onclick="togglePlay()">▶</button>
          <button class="btn-skip" onclick="skip(10)">10秒 ⏩</button>
        </div>
        <div class="volume-row">
          <span class="volume-icon">🔊</span>
          <input type="range" class="volume-slider" id="volSlider" min="0" max="100" value="100" oninput="setVolume(this.value)">
          <span class="volume-val" id="volVal">100%</span>
        </div>
      </div>
    </div>
  </div>

  <!-- PDF -->
  <div class="pdf-card">
    <div class="pdf-card-header">📄 問題・解答PDF</div>
    <div class="pdf-row">
      <div class="pdf-icon">📝</div>
      <div class="pdf-label">問題</div>
      <button class="btn-pdf" onclick="openPdf('pdf/seito/pretest-grade2-term1-english-q.pdf')">開く</button>
    </div>
    <div class="pdf-row">
      <div class="pdf-icon">✅</div>
      <div class="pdf-label">解答・解説</div>
      <button class="btn-pdf answer" onclick="openPdf('pdf/seito/pretest-grade2-term1-english-a.pdf')">開く</button>
    </div>
  </div>
</div>

<audio id="audioEl" src="pdf/seito/audio/中2前期中間リスニング.mp3" preload="metadata"></audio>

<script>
var audio = document.getElementById('audioEl');
var btnPlay = document.getElementById('btnPlay');
var barFill = document.getElementById('barFill');
var timeCurrent = document.getElementById('timeCurrent');
var timeDuration = document.getElementById('timeDuration');
var barWrap = document.getElementById('barWrap');

function fmt(s) {
  var m = Math.floor(s / 60);
  var sec = Math.floor(s % 60);
  return m + ':' + (sec < 10 ? '0' : '') + sec;
}

audio.addEventListener('loadedmetadata', function() {
  timeDuration.textContent = fmt(audio.duration);
});

audio.addEventListener('timeupdate', function() {
  timeCurrent.textContent = fmt(audio.currentTime);
  barFill.style.width = (audio.currentTime / audio.duration * 100) + '%';
});

audio.addEventListener('ended', function() {
  btnPlay.textContent = '▶';
});

function setVolume(v) {
  audio.volume = v / 100;
  document.getElementById('volVal').textContent = v + '%';
  document.getElementById('volSlider').value = v;
}
function togglePlay() {
  if (audio.paused) {
    audio.play();
    btnPlay.textContent = '⏸';
  } else {
    audio.pause();
    btnPlay.textContent = '▶';
  }
}

function skip(sec) {
  audio.currentTime = Math.max(0, Math.min(audio.duration, audio.currentTime + sec));
}

barWrap.addEventListener('click', function(e) {
  var rect = barWrap.getBoundingClientRect();
  var ratio = (e.clientX - rect.left) / rect.width;
  audio.currentTime = ratio * audio.duration;
});

function openPdf(path) {
  var a = document.createElement('a');
  a.href = path;
  a.target = '_blank';
  a.rel = 'noopener';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
}
</script>
</body>
</html>
